name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    # Must match the GitHub Environment name configured under npm package → Trusted publishing.
    environment: default-publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      # Trusted Publishing (OIDC) requires npm CLI ≥ 11.5.1 (bundled npm on older Node may be too old).
      - name: Ensure npm supports Trusted Publishing
        run: npm install -g npm@^11.5.1

      - name: Verify import-test against workspace
        run: pnpm test:import

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # `version` consumes pending changesets and opens/updates a "Version Packages" PR.
          # `publish` runs after that PR is merged: it publishes to npm and creates GitHub Releases.
          version: pnpm run version
          publish: pnpm run release
          commit: "chore: release"
          title: "chore: release"
          github-token: ${{ secrets.CHANGESETS_GITHUB_TOKEN }}
        env:
          NPM_CONFIG_PROVENANCE: "true"
